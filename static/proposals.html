<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>llm-curator — Proposals</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div id="app-wrapper">

  <nav id="sidebar">
    <div class="sidebar-brand">llm-curator<small>evaluation platform</small></div>
    <ul class="sidebar-nav">
      <li><a href="/"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
      <div class="sidebar-section">Evaluate</div>
      <li><a href="/leaderboard.html"><i class="bi bi-trophy"></i> Leaderboard</a></li>
      <li><a href="/registry.html"><i class="bi bi-database"></i> Registry</a></li>
      <div class="sidebar-section">Monitor</div>
      <li><a href="/proposals.html"><i class="bi bi-lightbulb"></i> Proposals</a></li>
      <li><a href="/alerts.html"><i class="bi bi-bell"></i> Alerts <span id="alert-badge" class="bdg bdg-red ms-auto" style="display:none"></span></a></li>
      <div class="sidebar-section">Configure</div>
      <li><a href="/settings.html"><i class="bi bi-gear"></i> Settings</a></li>
    </ul>
    <div class="sidebar-footer">v0.4</div>
  </nav>

  <div id="main-content">
    <div class="content-header">
      <div><h5>Proposals</h5><p>Weekly routing change recommendations — never auto-applied</p></div>
    </div>

    <div class="content-body">

      <!-- List -->
      <div id="proposals-list">
        <div class="loading-state">Loading…</div>
      </div>

      <!-- Detail panel -->
      <div id="proposal-detail" class="mt-3" style="display:none">
        <div class="panel">
          <div class="panel-header">
            <span id="detail-title">Proposal detail</span>
            <div class="d-flex gap-2">
              <button class="btn btn-sm btn-outline-secondary" id="btn-export" onclick="exportProposal()" style="display:none">
                <i class="bi bi-download me-1"></i>Export JSON
              </button>
              <button class="btn btn-sm btn-danger" id="btn-reject" onclick="reviewProposal('reject')" style="display:none">
                <i class="bi bi-x-circle me-1"></i>Reject
              </button>
              <button class="btn btn-sm btn-success" id="btn-apply" onclick="reviewProposal('apply')" style="display:none">
                <i class="bi bi-check-circle me-1"></i>Apply
              </button>
              <button class="btn btn-sm btn-outline-secondary" onclick="closeDetail()">✕ Close</button>
            </div>
          </div>
          <div id="detail-action-result" class="px-3 py-2" style="display:none"></div>
          <div class="panel-body" id="detail-body"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
<script>
let proposals = [];
let currentProposal = null;

function changeClass(kind) {
  return { replace: 'change-replace', add: 'change-add', remove: 'change-remove' }[kind] || '';
}

function renderChangeItem(c) {
  const kind = c.kind || '?';
  let detail = '';
  const fromModel = c.old_model || c.from_model || '';
  const toModel   = c.new_model || c.to_model   || '';
  if (kind === 'replace') detail = `<span class="mono">${fromModel}</span> → <span class="mono">${toModel}</span>`;
  if (kind === 'add')     detail = `<span class="mono">${toModel}</span>`;
  if (kind === 'remove')  detail = `<span class="mono">${c.alias || fromModel}</span>`;
  const ev = c.evidence ? ` <span class="s-nil">(score ${fmtScore(c.evidence.new_score)}, ${c.evidence.n_evals} evals)</span>` : '';
  return `
    <div class="change-item ${changeClass(kind)}">
      <div class="change-kind">${kind}</div>
      <div>${c.alias ? `<span class="s-nil me-1">${c.alias}:</span>` : ''}${detail}${ev}</div>
      ${c.rationale ? `<div class="s-nil mt-1" style="font-size:0.75rem">${c.rationale}</div>` : ''}
    </div>`;
}

function renderNeedsEval(items) {
  if (!items || !items.length) return '';
  return `<div class="mt-3">
    <div style="font-size:0.75rem;font-weight:600;color:#94a3b8;margin-bottom:6px">NEEDS EVAL DATA</div>
    ${items.map(n => `<div class="change-item" style="border-left-color:#94a3b8">
      <div class="change-kind" style="background:#334155;color:#94a3b8">${n.tier || 'alias'}</div>
      <div><span class="mono">${n.alias}</span> → <span class="s-nil">${n.model}</span></div>
      ${n.reason ? `<div class="s-nil mt-1" style="font-size:0.75rem">${n.reason}</div>` : ''}
    </div>`).join('')}
  </div>`;
}

async function showDetail(id) {
  currentProposal = null;
  document.getElementById('proposal-detail').style.display = 'block';
  document.getElementById('detail-body').innerHTML = '<div class="loading-state">Loading…</div>';
  document.getElementById('detail-title').textContent = `Proposal #${id}`;
  document.getElementById('detail-action-result').style.display = 'none';
  ['btn-export','btn-apply','btn-reject'].forEach(b => document.getElementById(b).style.display = 'none');

  try {
    const p = await api(`/api/proposals/${id}`);
    currentProposal = p;
    const raw = p.proposed_changes || {};
    const changes   = Array.isArray(raw) ? raw : (raw.changes   || []);
    const needsEval = Array.isArray(raw) ? []  : (raw.needs_eval || []);

    document.getElementById('detail-body').innerHTML = (changes.length || needsEval.length)
      ? changes.map(renderChangeItem).join('') + renderNeedsEval(needsEval)
      : '<div class="empty-state">No changes proposed.</div>';

    // Show action buttons only for pending proposals
    document.getElementById('btn-export').style.display = 'inline-flex';
    if (p.status === 'pending') {
      document.getElementById('btn-apply').style.display  = 'inline-flex';
      document.getElementById('btn-reject').style.display = 'inline-flex';
    }
    document.getElementById('proposal-detail').scrollIntoView({ behavior: 'smooth' });
  } catch (err) {
    document.getElementById('detail-body').innerHTML = `<div class="empty-state text-danger">Error: ${err.message}</div>`;
  }
}

function closeDetail() {
  document.getElementById('proposal-detail').style.display = 'none';
  currentProposal = null;
}

async function exportProposal() {
  if (!currentProposal) return;
  const data = await api(`/api/proposals/${currentProposal.id}/export`);
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `proposal-${currentProposal.id}.json`;
  a.click();
}

async function reviewProposal(action) {
  if (!currentProposal) return;
  const note = prompt(`Optional note for ${action}:`);
  if (note === null) return; // cancelled
  const resultEl = document.getElementById('detail-action-result');
  try {
    const res = await fetch(`/api/proposals/${currentProposal.id}/${action}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({note: note || ''}),
    }).then(r => r.json());

    resultEl.style.display = 'block';
    const isApply = action === 'apply';
    resultEl.className = `px-3 py-2 ${isApply ? 'test-ok' : 'test-err'}`;
    resultEl.innerHTML = isApply
      ? `<i class="bi bi-check-circle me-1"></i>Proposal applied${note ? ` — "${note}"` : ''}. Webhook fired if configured.`
      : `<i class="bi bi-x-circle me-1"></i>Proposal rejected${note ? ` — "${note}"` : ''}.`;

    // Hide action buttons, refresh list
    ['btn-apply','btn-reject'].forEach(b => document.getElementById(b).style.display = 'none');
    proposals = await api('/api/proposals/');
    renderProposals(proposals);
  } catch (err) {
    resultEl.style.display = 'block';
    resultEl.className = 'px-3 py-2 test-err';
    resultEl.innerHTML = `<i class="bi bi-x-circle me-1"></i>Error: ${err.message}`;
  }
}

function renderProposals(rows) {
  const el = document.getElementById('proposals-list');
  if (!rows.length) {
    el.innerHTML = '<div class="empty-state">No proposals generated yet.</div>';
    return;
  }
  el.innerHTML = `
    <div class="table-wrap">
      <table class="table table-hover">
        <thead><tr>
          <th>Date</th><th>Summary</th><th>Status</th>
          <th>Replace</th><th>Add</th><th>Remove</th><th></th>
        </tr></thead>
        <tbody>
          ${rows.map(p => `
            <tr>
              <td style="white-space:nowrap">${fmtDate(p.generated_at)}</td>
              <td style="max-width:340px;font-size:0.8rem">${p.summary || '—'}</td>
              <td>${statusBadge(p.status)}</td>
              <td><span class="bdg bdg-yellow">${p.n_replacements}</span></td>
              <td><span class="bdg bdg-green">${p.n_additions}</span></td>
              <td><span class="bdg bdg-red">${p.n_removals}</span></td>
              <td><button class="btn btn-sm btn-outline-primary" onclick="showDetail(${p.id})">View</button></td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

document.addEventListener('DOMContentLoaded', async () => {
  try {
    proposals = await api('/api/proposals/');
    renderProposals(proposals);
  } catch (err) {
    document.getElementById('proposals-list').innerHTML =
      `<div class="empty-state text-danger">Error: ${err.message}</div>`;
  }
});
</script>
</body>
</html>
