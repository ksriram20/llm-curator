<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>llm-curator — Leaderboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div id="app-wrapper">

  <nav id="sidebar">
    <div class="sidebar-brand">llm-curator<small>evaluation platform</small></div>
    <ul class="sidebar-nav">
      <li><a href="/"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
      <div class="sidebar-section">Evaluate</div>
      <li><a href="/leaderboard.html"><i class="bi bi-trophy"></i> Leaderboard</a></li>
      <li><a href="/registry.html"><i class="bi bi-database"></i> Registry</a></li>
      <div class="sidebar-section">Monitor</div>
      <li><a href="/proposals.html"><i class="bi bi-lightbulb"></i> Proposals</a></li>
      <li><a href="/alerts.html"><i class="bi bi-bell"></i> Alerts <span id="alert-badge" class="bdg bdg-red ms-auto" style="display:none"></span></a></li>
    </ul>
    <div class="sidebar-footer">v0.2 · read-only</div>
  </nav>

  <div id="main-content">
    <div class="content-header">
      <div><h5>Leaderboard</h5><p>Models ranked by mean eval score</p></div>
      <span id="row-count" class="bdg bdg-gray"></span>
    </div>

    <div class="content-body">
      <div class="filters">
        <label>Grader version</label>
        <select id="f-version">
          <option value="v2">v2 (current)</option>
          <option value="v1">v1 (baseline)</option>
        </select>
        <label>Show</label>
        <select id="f-limit">
          <option value="25">Top 25</option>
          <option value="50" selected>Top 50</option>
          <option value="100">Top 100</option>
        </select>
        <label>Source</label>
        <select id="f-source">
          <option value="">All</option>
          <option value="openrouter">OpenRouter</option>
          <option value="ollama-cloud">Ollama Cloud</option>
        </select>
      </div>

      <div class="table-wrap">
        <table class="table table-hover">
          <thead>
            <tr>
              <th>#</th>
              <th>Model</th>
              <th>Source</th>
              <th>Status</th>
              <th>Mean</th>
              <th>Reasoning</th>
              <th>Extraction</th>
              <th>Classification</th>
              <th>Summarization</th>
              <th>Latency</th>
              <th>Last tested</th>
            </tr>
          </thead>
          <tbody id="lb-tbody">
            <tr><td colspan="11" class="loading-state">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
<script>
let allRows = [];

function applyFilters() {
  const src = document.getElementById('f-source').value;
  let rows = allRows;
  if (src) rows = rows.filter(r => r.source === src);

  document.getElementById('row-count').textContent = `${rows.length} models`;
  renderTable('lb-tbody', rows, [
    (r, i) => `<span class="s-nil" style="font-size:0.75rem">${(i||0)+1}</span>`,
    r => `<span class="mono" style="font-size:0.78rem">${r.model_id}</span>`,
    r => `<span class="bdg bdg-gray">${r.source}</span>`,
    r => [freeBadge(r.is_free), routingBadge(r.in_litellm), deprecatedBadge(r.deprecated)].filter(Boolean).join(' '),
    r => fmtScore(r.mean_score),
    r => fmtScore(r.reasoning),
    r => fmtScore(r.extraction),
    r => fmtScore(r.classification),
    r => fmtScore(r.summarization),
    r => fmtLatency(r.avg_latency_ms),
    r => fmtDate(r.last_tested),
  ]);
}

async function load() {
  const version = document.getElementById('f-version').value;
  const limit   = document.getElementById('f-limit').value;
  document.getElementById('lb-tbody').innerHTML =
    '<tr><td colspan="11" class="loading-state">Loading…</td></tr>';
  try {
    allRows = await api(`/api/leaderboard/?grader_version=${version}&limit=${limit}`);
    // Inject index for rank column
    allRows.forEach((r, i) => r._idx = i);
    applyFilters();
  } catch (err) {
    document.getElementById('lb-tbody').innerHTML =
      `<tr><td colspan="11" class="empty-state text-danger">Error: ${err.message}</td></tr>`;
  }
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('f-version').addEventListener('change', load);
  document.getElementById('f-limit').addEventListener('change', load);
  document.getElementById('f-source').addEventListener('change', applyFilters);
  load();
});
</script>
</body>
</html>
