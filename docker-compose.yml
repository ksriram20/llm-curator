# llm-curator — fully self-contained stack (own Postgres + scheduler).
# Optional: mount your litellm_config.yaml via LITELLM_CONFIG_PATH in .env
# to enable proposal comparison. Leave unset to run completely standalone.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: curator_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: curator
    volumes:
      - curator_pgdata:/var/lib/postgresql/data
      # Schema is applied automatically on a FRESH volume, in filename order.
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U curator_user -d curator"]
      interval: 5s
      timeout: 5s
      retries: 10

  curator:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      TZ: Asia/Kolkata
      DATABASE_URL: postgresql://curator_user:${POSTGRES_PASSWORD:-changeme}@db:5432/curator
      LITELLM_CONFIG_PATH: /config/litellm_config.yaml
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Read-only mount of your LiteLLM config (optional — proposals work without it).
      - ${LITELLM_CONFIG_PATH:-/dev/null}:/config/litellm_config.yaml:ro

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://curator_user:${POSTGRES_PASSWORD:-changeme}@db:5432/curator
    ports:
      - "127.0.0.1:8088:8080"

volumes:
  curator_pgdata:
